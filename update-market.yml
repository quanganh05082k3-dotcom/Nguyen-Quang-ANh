name: Update XAUUSD market data
on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: node scripts/update-market.mjs
      - run: |
          git config user.name "market-data-bot"
          git config user.email "market-data-bot@users.noreply.github.com"
          git add market.json
          git diff --staged --quiet || git commit -m "Update XAUUSD market data"
          git push
